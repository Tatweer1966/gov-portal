events {
    worker_connections 1024;
}

http {
    upstream frontend {
        server frontend:3000;
    }

    upstream cms {
        server strapi:1337;
    }

    # Redirect HTTP to HTTPS (for production; for demo, we keep HTTP)
    server {
        listen 80;
        server_name localhost;
        # return 301 https://$server_name$request_uri;  # Uncomment for HTTPS
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /admin {
            proxy_pass http://cms;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api {
            proxy_pass http://cms;
            proxy_set_header Host $host;
        }

        location /uploads {
            proxy_pass http://cms;
            proxy_set_header Host $host;
        }
    }

    # HTTPS server (if certificates are available)
