services:
  postgres:
    image: postgres:15-alpine
    container_name: gov-portal-db
    environment:
      POSTGRES_USER: govportal
      POSTGRES_PASSWORD: GovPortal@2025
      POSTGRES_DB: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U govportal -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - gov-network

  redis:
    image: redis:7-alpine
    container_name: gov-portal-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - gov-network

  minio:
    image: minio/minio:latest
    container_name: gov-portal-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "mc --help >/dev/null 2>&1 || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - gov-network

  opensearch:
    image: opensearchproject/opensearch:2.11.1
    container_name: gov-portal-search
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
      - "9600:9600"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    networks:
      - gov-network

  directus:
    image: directus/directus:10.10.0
    container_name: gov-portal-directus
    environment:
      KEY: "8dfa8d5286e241459c5b8ada660fd253639858698ebb41a1a806dd55f1f6c079"
      SECRET: "replace-with-a-secure-random-secret-32-chars"
      ADMIN_EMAIL: "admin@example.com"
      ADMIN_PASSWORD: "Admin1234"

      DB_CLIENT: "pg"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_DATABASE: "govportal_cms"
      DB_USER: "govportal"
      DB_PASSWORD: "GovPortal@2025"

      WEBSOCKETS_ENABLED: "true"

      CACHE_ENABLED: "true"
      CACHE_STORE: "redis"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"

      PUBLIC_URL: "http://localhost:8055"

      STORAGE_LOCATIONS: "s3"
      STORAGE_S3_DRIVER: "s3"
      STORAGE_S3_KEY: "minioadmin"
      STORAGE_S3_SECRET: "minioadmin123"
      STORAGE_S3_ENDPOINT: "http://minio:9000"
      STORAGE_S3_BUCKET: "govportal-media"
      STORAGE_S3_REGION: "us-east-1"
      STORAGE_S3_FORCE_PATH_STYLE: "true"

    ports:
      - "8055:8055"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - gov-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gov-portal-frontend
    environment:
      NODE_ENV: production

      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: govportal_app
      DATABASE_USERNAME: govportal
      DATABASE_PASSWORD: GovPortal@2025

      DIRECTUS_URL: http://directus:8055
      NEXT_PUBLIC_DIRECTUS_URL: http://localhost:8055
      DIRECTUS_TOKEN: 99bac2e075754736977d07790bf729c6dfc2ccaf8c774ebab3bb0213859a7448

      OPENSEARCH_URL: http://opensearch:9200
      NEXT_PUBLIC_OPENSEARCH_URL: http://localhost:9200
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      directus:
        condition: service_started
      opensearch:
        condition: service_started
    networks:
      - gov-network

  prometheus:
    image: prom/prometheus:latest
    container_name: gov-portal-prometheus
    ports:
      - "9090:9090"
    networks:
      - gov-network

  grafana:
    image: grafana/grafana:latest
    container_name: gov-portal-grafana
    ports:
      - "3001:3000"
    networks:
      - gov-network

  nginx:
    image: nginx:alpine
    container_name: gov-portal-nginx
    ports:
      - "80:80"
    depends_on:
      - frontend
      - directus
    networks:
      - gov-network

networks:
  gov-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  opensearch_data: